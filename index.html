<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rohan's Smart Tools</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        .tool-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; }
        textarea { width: 90%; height: 100px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .res { font-weight: bold; margin-top: 10px; color: #2ecc71; font-size: 18px; }
    </style>
</head>
<body>
    <h1>🚀 DevRohan Smart Tools</h1>
    <div class="tool-card">
        <h3>Word Counter</h3>
        <textarea id="inp" placeholder="Kuch bhi type karein..."></textarea>
        <div id="wCount" class="res">Words: 0</div>
    </div>
    <div class="tool-card">
        <h3>Password Generator</h3>
        <button onclick="gen()">Generate Now</button>
        <div id="pRes" class="res"></div>
    </div>
    <script>
        document.getElementById('inp').addEventListener('input', function(){
            let words = this.value.trim().split(/\s+/).filter(x => x).length;
            document.getElementById('wordRes').innerText = "Total Words: " + words;
        });
        function gen() {
            let pass = Math.random().toString(36).slice(-10);
            document.getElementById('pRes').innerText = pass;
        }
    </script>
</body>
</html>
